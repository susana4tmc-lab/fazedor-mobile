<!DOCTYPE html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width, initial-scale=1'><title>Mobile Full</title></head><body><div id='lista'></div><script>const MAP={"Anda lá…": ["Prefiro não fazer, a minha resposta é não."], "Só mais uma vez.": ["Mesmo assim, não quero repetir."], "Não custa nada.": ["Para mim custa, e isso importa. Prefiro não fazer"], "É só um bocadinho.": ["Eu decido o que quero fazer, e agora não quero."], "Não sejas chato.": ["Estou só a dizer o que preciso. Não é ser chato"], "Assim magoas-me.": ["Não quero magoar-te, mas a minha resposta não muda."], "Depois de tudo o que fiz…": ["Agradeço, mas mesmo assim prefiro não fazer."], "Toda a gente faz isso.": ["Eu posso escolher diferente dos outros."], "És o único que não quer.": ["Está tudo bem ser diferente. Eu não quero.", "Prefiro ser eu próprio do que fazer algo só para encaixar"], "Ninguém diz que não.": ["Eu digo não, e isso conta."], "Vais ser o único diferente.": ["Ser diferente não tem mal. A minha decisão é não."], "O teu amigo aceitou.": ["Eu não sou o meu amigo. Eu decido por mim."], "Estás a exagerar.": ["O que eu sinto é importante. E a minha resposta é não."], "Isso é parvo.": ["Não gostei do que disseste. Fala comigo com respeito."], "Estás confuso.": ["Eu sei o que sinto e sei o que quero."], "Não é assim tão grave.": ["Para mim é importante. Por isso digo não."], "Estás a inventar.": ["O que estou a dizer é verdade para mim."], "És mesmo difícil.": ["Por favor, sem ofensas. A minha resposta é não."], "És muito sensível.": ["O que eu sinto é válido. Continuo a não querer."], "Nunca queres nada.": ["Agora não quero isto. E isso está certo para mim."], "Só sabes reclamar.": ["Não estou a reclamar. Só estou a tentar contar-te o que me está a custar."], "Se disseres que não, é porque não te importas comigo.": ["Importo-me, mas também tenho limites. E digo não."], "É só por diversão, ninguém vai saber.": ["Mesmo assim, eu não quero. Para mim não está bem."], "Vamos filmar, vai ser épico.": ["Não quero ser filmado nem fazer isso. Prefiro não participar."], "Uma vez não faz mal.": ["Eu decido o que é seguro para mim. E escolho não fazer."], "Se não fizeres, estragas a brincadeira.": ["Podemos brincar sem isso. Eu não quero participar nisso."], "Se fosses mesmo meu amigo, fazias isto por mim": ["Posso ser teu amigo e dizer não ao mesmo tempo."], "Se não fizeres, não andas connosco.": ["Um amigo aceita o outro mesmo quando ele diz não."], "Até os mais novos aceitam… e tu não?": ["Cada pessoa decide por si. Eu decido não fazer."], "Já fizemos mil vezes e nunca aconteceu nada": ["Mesmo assim, eu prefiro não arriscar."], "Vais ser o único diferente": ["Eu não preciso de fazer o mesmo que os outros para estar bem."], "Duvido que consigas — prova!": ["Não preciso de provar nada. Não vou fazer."], "Se todos fizermos, tu também tens de fazer.": ["Eu escolho por mim. E escolho não fazer."], "Os outros não têm medo — só tu.": ["O meu medo é importante. E eu escolho não fazer."], "Fazes parte do grupo ou não?": ["Faço parte, mas não tenho de fazer tudo. Isto eu não quero fazer."], "Faz isso por mim...": ["Gosto de ti, mas mesmo assim digo não."], "Um amigo verdadeiro não me deixava sozinho nesta.": ["Posso ser teu amigo, mas tenho de respeitar os meus limites."], "És um mau amigo se me deixares pendurado.": ["Ser amigo não é fazer tudo. E eu não quero fazer isto."]};const LIST=Object.keys(MAP).map((t,i)=>({id:i,txt:t,resp:'',emos:[]}));function render(){const root=document.getElementById('lista');root.innerHTML='';LIST.forEach(x=>{const d=document.createElement('div');d.innerHTML='<h3>'+x.txt+'</h3>';const emo=document.createElement('div');['🙂','🙁','😡','😨','😕','😳','😬','😌'].forEach(e=>{const b=document.createElement('button');b.textContent=e;b.onclick=()=>{if(!x.emos.includes(e))x.emos.push(e);else x.emos=x.emos.filter(z=>z!==e);};emo.appendChild(b);});d.appendChild(emo);const sel=document.createElement('select');['— selecionar —',...MAP[x.txt]].forEach(o=>{const op=document.createElement('option');op.textContent=o;sel.appendChild(op);});sel.onchange=()=>x.resp=sel.value;d.appendChild(sel);root.appendChild(d);});}render();</script><button id='verifyAlways' style='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;background:#22c55e;color:white;padding:14px 20px;border:none;border-radius:12px;font-size:18px;'>Verificar</button>
<script>
document.addEventListener('DOMContentLoaded',()=>{
 const btn=document.getElementById('verifyAlways');
 btn.onclick=()=>{
   let total=0, corretos=0;
   LIST.forEach(x=>{
     if(x.resp){ total++; if(MAP[x.txt].includes(x.resp)) corretos++; }
   });
   alert('Acertos: '+corretos+' / '+total);
 };
});
</script>
</body></html>
