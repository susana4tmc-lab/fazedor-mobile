<script id="logicaAprende">

let indiceAtual = 0;
let progresso = {};
let filtroAtivo = "todas";

/* ----------------------------------------------
   1. Recolher todas as respostas da categoria
   ---------------------------------------------- */
function respostasDaCategoria(cat) {
  const todas = [];

  window.FRASES.forEach(f => {
    if (f.categoria === cat) {
      f.respostas.forEach(r => {
        if (!todas.includes(r)) todas.push(r);
      });
    }
  });

  return todas;
}

/* ----------------------------------------------
   2. Filtrar frases conforme categoria escolhida
   ---------------------------------------------- */
function frasesFiltradas() {
  if (filtroAtivo === "todas") return window.FRASES;
  return window.FRASES.filter(f => f.categoria === filtroAtivo);
}

/* ----------------------------------------------
   3. Renderizar filtro pequeno (botões)
   ---------------------------------------------- */
function renderFiltro(container) {
  const categorias = ["todas", ...new Set(window.FRASES.map(f => f.categoria))];

  const wrap = document.createElement("div");
  wrap.className = "filtroCategorias";

  categorias.forEach(cat => {
    const b = document.createElement("button");
    b.textContent = cat;

    if (filtroAtivo === cat) b.classList.add("active");

    b.onclick = () => {
      filtroAtivo = cat;
      indiceAtual = 0;
      renderFrase();
    };

    wrap.appendChild(b);
  });

  container.appendChild(wrap);
}

/* ----------------------------------------------
   4. Animação do emoji Alívio
   ---------------------------------------------- */
function animarAlivio(btn) {
  btn.animate(
    [
      { transform: "scale(1)" },
      { transform: "scale(1.25)" },
      { transform: "scale(1)" }
    ],
    { duration: 350, easing: "ease-out" }
  );
}

/* ----------------------------------------------
   5. RENDER DA FRASE
   ---------------------------------------------- */
function renderFrase() {

  const lista = frasesFiltradas();
  const dados = lista[indiceAtual];

  const container = document.getElementById("modo-aprende");
  container.innerHTML = "";

  renderFiltro(container);

  const card = document.createElement("div");
  card.className = "card";

  const title = document.createElement("h3");
  title.textContent = dados.txt;

  const cat = document.createElement("div");
  cat.textContent = "Categoria: " + dados.categoria;
  cat.style.fontSize = "0.9rem";
  cat.style.color = "#666";

  /* -------- EMOÇÕES -------- */

  const emoBar = document.createElement("div");
  emoBar.className = "emoBar";

  const progressoAtual = progresso[dados.txt];

  window.EMOCOES.forEach(e => {
    const b = document.createElement("div");
    b.className = "emo";
    b.textContent = e.emoji;

    // desativar alívio até haver resposta
    if (e.gated && !progressoAtual?.respostaSelecionada) {
      b.style.opacity = "0.4";
      b.style.pointerEvents = "none";
    }

    // manter selecionadas
    if (progressoAtual?.emo?.includes(e.emoji)) {
      b.style.border = "2px solid var(--ok)";
    }

    b.onclick = () => {
      if (!progresso[dados.txt]) progresso[dados.txt] = {};
      const arr = progresso[dados.txt].emo ?? [];

      if (arr.includes(e.emoji)) {
        progresso[dados.txt].emo = arr.filter(x => x !== e.emoji);
      } else {
        progresso[dados.txt].emo = [...arr, e.emoji];

        if (e.gated) animarAlivio(b);
      }

      renderFrase();
    };

    emoBar.appendChild(b);
  });

  /* -------- DROPDOWN DE RESPOSTAS -------- */

  const sel = document.createElement("select");

  const opt0 = document.createElement("option");
  opt0.value = "";
  opt0.textContent = "— escolher resposta —";
  sel.appendChild(opt0);

  // respostas da CATEGORIA inteira
  const respostas = respostasDaCategoria(dados.categoria);

  respostas.forEach(r => {
    const o = document.createElement("option");
    o.value = r;
    o.textContent = r;
    sel.appendChild(o);
  });

  if (progressoAtual?.respostaSelecionada) {
    sel.value = progressoAtual.respostaSelecionada;
  }

  const feedback = document.createElement("div");
  feedback.style.marginTop = "12px";

  sel.onchange = () => {
    if (!progresso[dados.txt]) progresso[dados.txt] = {};

    progresso[dados.txt].respostaSelecionada = sel.value;

    // APAGA TODAS AS EMOÇÕES automaticamente
    if (progresso[dados.txt]?.emo) {
      delete progresso[dados.txt].emo;
    }

    feedback.innerHTML =
      "✔️ Boa escolha! Estás a reconhecer a pressão e a proteger os teus limites.";

    renderFrase();
  };

  /* -------- NAVEGAÇÃO -------- */

  const nav = document.createElement("div");
  nav.className = "navBtns";

  const btnPrev = document.createElement("button");
  btnPrev.textContent = "⬅️ Anterior";
  btnPrev.disabled = indiceAtual === 0;
  btnPrev.onclick = () => {
    indiceAtual--;
    renderFrase();
  };

  const btnNext = document.createElement("button");
  btnNext.textContent = "Próxima ➡️";
  btnNext.disabled = !progressoAtual?.respostaSelecionada;
  btnNext.onclick = () => {
    indiceAtual++;
    renderFrase();
  };

  nav.appendChild(btnPrev);
  nav.appendChild(btnNext);

  const prog = document.createElement("div");
  prog.textContent = `Frase ${indiceAtual + 1} de ${lista.length}`;
  prog.style.fontSize = "0.85rem";
  prog.style.color = "#666";

  /* -------- MONTAGEM -------- */

  card.appendChild(title);
  card.appendChild(cat);
  card.appendChild(emoBar);
  card.appendChild(sel);
  card.appendChild(feedback);
  card.appendChild(nav);
  card.appendChild(prog);

  container.appendChild(card);
}

/* ----------------------------------------------
   6. Função de mudar tab (necessária!)
   ---------------------------------------------- */
function mudarTab(tab) {
  if (tab === "aprende") {
    document.getElementById("modo-aprende").style.display = "block";
    document.getElementById("modo-identifica").style.display = "none";

    document.querySelectorAll(".tab")[0].classList.add("active");
    document.querySelectorAll(".tab")[1].classList.remove("active");
  } else {
    document.getElementById("modo-aprende").style.display = "none";
    document.getElementById("modo-identifica").style.display = "block";

    document.querySelectorAll(".tab")[1].classList.add("active");
    document.querySelectorAll(".tab")[0].classList.remove("active");
  }
}

/* ----------------------------------------------
   7. INICIALIZAÇÃO
   ---------------------------------------------- */
document.addEventListener("DOMContentLoaded", () => {
  renderFrase();
});

</script>

<script id="logicaIdentifica">

/* ----------------------------------------------
   1. CATEGORIZAÇÃO SIMPLIFICADA
   ---------------------------------------------- */

const CATEGORIAS_IDENTIFICA = {
  "respeito": "Frases respeitadoras",
  "duvida": "Frases duvidosas",
  "pressao": "Frases de pressão"
};

const RESPEITADORAS = [
  "Queres provar um bocadinho?",
  "Se não quiseres, não faz mal.",
  "Podes escolher.",
  "Está tudo bem se disseres que não.",
  "Queres ir brincar ou preferes ficar aqui?",
  "Diz se não te apetecer.",
  "Só se quiseres.",
  "Não faz mal nenhum se não quiseres.",
  "Faz como tu achares melhor",
  "Queres jogar comigo?"
];

const DUVIDOSAS = [
  "Estou só a tentar ajudar…",
  "É para teu bem.",
  "Eu só quero ser simpático.",
  "Não percebo porque não queres."
];

function tipoFrase(txt) {
  if (RESPEITADORAS.includes(txt)) return "respeito";
  if (DUVIDOSAS.includes(txt)) return "duvida";
  return "pressao";
}

function gerarFrasesExercicio() {
  const press = window.FRASES.map(f => f.txt);

  const deck = [
    ...RESPEITADORAS.map(t => ({ txt: t, tipo: "respeito" })),
    ...DUVIDOSAS.map(t => ({ txt: t, tipo: "duvida" })),
    ...press.map(t => ({ txt: t, tipo: "pressao" }))
  ];

  return deck.sort(() => Math.random() - 0.5);
}

function renderIdentifica() {

  const container = document.getElementById("modo-identifica");
  container.innerHTML = "";

  const card = document.createElement("div");
  card.className = "card";

  const titulo = document.createElement("h3");
  titulo.textContent = "🧠 Exercício: identifica o tipo de frase";
  card.appendChild(titulo);

  const p = document.createElement("p");
  p.textContent = "Arrasta cada frase para a categoria correta, ou usa os botões.";
  p.style.fontSize = "0.9rem";
  p.style.color = "#555";
  card.appendChild(p);

  const zonas = document.createElement("div");
  zonas.style.marginTop = "20px";

  const zonaRes = criarDropzone("respeito");
  const zonaDuv = criarDropzone("duvida");
  const zonaPre = criarDropzone("pressao");

  zonas.appendChild(zonaRes.container);
  zonas.appendChild(zonaDuv.container);
  zonas.appendChild(zonaPre.container);

  const listaFrases = gerarFrasesExercicio();

  const pool = document.createElement("div");
  pool.style.marginTop = "20px";

  listaFrases.forEach(obj => {
    pool.appendChild(criarDraggable(obj, zonaRes, zonaDuv, zonaPre));
  });

  const controls = document.createElement("div");
  controls.style.marginTop = "20px";
  controls.style.display = "flex";
  controls.style.flexDirection = "column";
  controls.style.gap = "10px";

  const btnVer = document.createElement("button");
  btnVer.textContent = "✅ Verificar";
  btnVer.style.padding = "12px";
  btnVer.style.borderRadius = "10px";
  btnVer.style.border = "none";
  btnVer.style.background = "var(--ok)";
  btnVer.style.color = "white";
  btnVer.onclick = () => verificarExercicio(zonaRes, zonaDuv, zonaPre);

  const btnSol = document.createElement("button");
  btnSol.textContent = "👀 Mostrar solução";
  btnSol.style.padding = "12px";
  btnSol.style.borderRadius = "10px";
  btnSol.style.border = "none";
  btnSol.style.background = "#888";
  btnSol.style.color = "white";
  btnSol.onclick = () => mostrarSolucao(zonaRes, zonaDuv, zonaPre, listaFrases);

  const btnRedo = document.createElement("button");
  btnRedo.textContent = "↩️ Refazer só erradas";
  btnRedo.style.padding = "12px";
  btnRedo.style.borderRadius = "10px";
  btnRedo.style.border = "none";
  btnRedo.style.background = "#ffba4b";
  btnRedo.style.color = "white";
  btnRedo.onclick = () => refazerErradas(zonaRes, zonaDuv, zonaPre, pool);

  controls.appendChild(btnVer);
  controls.appendChild(btnSol);
  controls.appendChild(btnRedo);

  card.appendChild(zonas);
  card.appendChild(pool);
  card.appendChild(controls);

  container.appendChild(card);
}

function criarDropzone(tipo) {

  const container = document.createElement("div");
  container.className = "dropzone";

  const titulo = document.createElement("h4");
  titulo.textContent = CATEGORIAS_IDENTIFICA[tipo];
  container.appendChild(titulo);

  const holder = document.createElement("div");
  holder.className = "holder";
  holder.style.display = "flex";
  holder.style.flexDirection = "column";
  holder.style.gap = "8px";
  holder.style.marginTop = "10px";
  container.appendChild(holder);

  container.ondragover = e => e.preventDefault();

  container.ondrop = e => {
    const txt = e.dataTransfer.getData("text");
    moverCardPara(tipo, txt, holder);
  };

  return { container, holder };
}

function criarDraggable(obj, zonaRes, zonaDuv, zonaPre) {

  const d = document.createElement("div");
  d.className = "draggable";
  d.draggable = true;
  d.textContent = obj.txt;

  d.ondragstart = e => {
    e.dataTransfer.setData("text", obj.txt);
  };

  const btns = document.createElement("div");
  btns.style.display = "flex";
  btns.style.gap = "6px";
  btns.style.marginTop = "6px";

  const b1 = document.createElement("button");
  b1.textContent = "➡️ Respeito";
  b1.onclick = () => moverCardPara("respeito", obj.txt, zonaRes.holder);

  const b2 = document.createElement("button");
  b2.textContent = "➡️ Duvidosa";
  b2.onclick = () => moverCardPara("duvida", obj.txt, zonaDuv.holder);

  const b3 = document.createElement("button");
  b3.textContent = "➡️ Pressão";
  b3.onclick = () => moverCardPara("pressao", obj.txt, zonaPre.holder);

  [b1, b2, b3].forEach(b => {
    b.style.border = "none";
    b.style.padding = "6px";
    b.style.borderRadius = "8px";
    b.style.background = "var(--cinza)";
    b.style.cursor = "pointer";
  });

  btns.appendChild(b1);
  btns.appendChild(b2);
  btns.appendChild(b3);

  d.appendChild(btns);

  return d;
}

function moverCardPara(tipo, txt, destino) {

  document.querySelectorAll(".draggable").forEach(el => {
    if (el.childNodes[0].nodeValue === txt) el.remove();
  });

  const novo = document.createElement("div");
  novo.className = "draggable";
  novo.textContent = txt;

  destino.appendChild(novo);
}

function verificarExercicio(zRes, zDuv, zPre) {

  let total = 0;
  let corretos = 0;

  function verificaZona(holder, tipoCerto) {
    const cards = holder.querySelectorAll(".draggable");
    cards.forEach(c => {
      total++;
      const texto = c.textContent.trim();
      const tipo = tipoFrase(texto);

      if (tipo === tipoCerto) {
        corretos++;
        c.style.border = "2px solid var(--ok)";
      } else {
        c.style.border = "2px solid var(--bad)";
      }
    });
  }

  verificaZona(zRes.holder, "respeito");
  verificaZona(zDuv.holder, "duvida");
  verificaZona(zPre.holder, "pressao");

  alert(`Acertaste ${corretos} em ${total}.`);
}

function mostrarSolucao(zRes, zDuv, zPre, lista) {

  zRes.holder.innerHTML = "";
  zDuv.holder.innerHTML = "";
  zPre.holder.innerHTML = "";

  lista.forEach(obj => {
    const destino =
      obj.tipo === "respeito" ? zRes.holder :
      obj.tipo === "duvida"   ? zDuv.holder :
                                zPre.holder;

    const d = document.createElement("div");
    d.className = "draggable";
    d.textContent = obj.txt;
    destino.appendChild(d);
  });
}

function refazerErradas(zRes, zDuv, zPre, pool) {

  const recolher = [];

  function recolhe(holder, tipo) {
    const cards = holder.querySelectorAll(".draggable");
    cards.forEach(c => {
      const texto = c.textContent.trim();
      const t = tipoFrase(texto);

      if (t !== tipo) {
        recolher.push({ txt: texto, tipo: t });
        c.remove();
      }
    });
  }

  recolhe(zRes.holder, "respeito");
  recolhe(zDuv.holder, "duvida");
  recolhe(zPre.holder, "pressao");

  recolher.forEach(obj => {
    pool.appendChild(criarDraggable(obj, zRes, zDuv, zPre));
  });
}

document.querySelectorAll(".tab")[1].addEventListener("click", () => {
  setTimeout(renderIdentifica, 50);
});

</script>

<script id="funcoesFinais">

/* ==========================================================
   1. EXPORTAÇÃO DAS RESPOSTAS EM .TXT
   ========================================================== */

function exportarTXT() {

  let linhas = [];

  for (let i = 0; i < window.FRASES.length; i++) {
    const f = window.FRASES[i];
    const prog = progresso[f.txt];

    if (!prog || !prog.respostaSelecionada) continue;

    const emos = prog.emo?.join(", ") || "(nenhuma)";

    linhas.push(
      `Frase: ${f.txt}\n` +
      `Categoria: ${f.categoria}\n` +
      `Emoções: ${emos}\n` +
      `Resposta escolhida: ${prog.respostaSelecionada}\n` +
      `----------------------------------------\n`
    );
  }

  if (linhas.length === 0) {
    alert("Ainda não respondeste a nenhuma frase.");
    return;
  }

  const blob = new Blob([linhas.join("")], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "respostas_assertivas.txt";
  a.click();

  URL.revokeObjectURL(url);
}


/* ==========================================================
   2. GUARDAR PROGRESSO LOCAL (localStorage)
   ========================================================== */

function guardarProgresso() {
  localStorage.setItem("fazedor_progresso", JSON.stringify(progresso));
}

function carregarProgresso() {
  const dado = localStorage.getItem("fazedor_progresso");
  if (dado) progresso = JSON.parse(dado);
}

setInterval(guardarProgresso, 2000);


/* ==========================================================
   3. RESET GERAL DO PROJETO
   ========================================================== */

function resetTudo() {
  if (!confirm("Tens a certeza? Isto apaga todo o teu progresso.")) return;

  progresso = {};
  localStorage.removeItem("fazedor_progresso");
  indiceAtual = 0;
  renderFrase();

  alert("Progresso limpo!");
}


/* ==========================================================
   4. UX – SCROLL PARA O TOPO QUANDO SE MUDA DE FRASE
   ========================================================== */

function scrollTopo() {
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.addEventListener("click", e => {
  if (e.target.id === "btnNext" || e.target.id === "btnPrev") {
    setTimeout(scrollTopo, 50);
  }
});


/* ==========================================================
   5. ADICIONAR BOTÕES EXTRA AO MODO APRENDE
   ========================================================== */

function inserirBotoesExtras() {

  const container = document.getElementById("modo-aprende");

  const zona = document.createElement("div");
  zona.style.display = "flex";
  zona.style.flexDirection = "column";
  zona.style.gap = "10px";
  zona.style.marginTop = "18px";

  const b1 = document.createElement("button");
  b1.textContent = "⬇️ Exportar respostas";
  b1.style.padding = "12px";
  b1.style.borderRadius = "10px";
  b1.style.border = "none";
  b1.style.background = "#6abf69";
  b1.style.color = "white";
  b1.onclick = exportarTXT;

  const b2 = document.createElement("button");
  b2.textContent = "🧹 Limpar progresso";
  b2.style.padding = "12px";
  b2.style.borderRadius = "10px";
  b2.style.border = "none";
  b2.style.background = "#c74949";
  b2.style.color = "white";
  b2.onclick = resetTudo;

  zona.appendChild(b1);
  zona.appendChild(b2);

  container.appendChild(zona);
}


/* ==========================================================
   6. INICIALIZAÇÃO FINAL
   ========================================================== */

document.addEventListener("DOMContentLoaded", () => {
  carregarProgresso();
  inserirBotoesExtras();
});

</script>
